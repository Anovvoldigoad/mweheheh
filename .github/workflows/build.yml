name: Build NSC-ModManager

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  PROJECT_PATH: NSC-ModManager/NSC-ModManager.csproj
  CONFIGURATION: Release

jobs:
  build:
    # WPF hanya bisa di-build di runner Windows (butuh Windows SDK / WPF toolchain)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c ${{ env.CONFIGURATION }} --no-restore

      - name: Publish (framework-dependent, x86, single output folder)
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c ${{ env.CONFIGURATION }}
          -r win-x86
          --self-contained false
          -p:PublishSingleFile=false
          -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NSC-ModManager-${{ github.sha }}
          path: publish/
          if-no-files-found: error

      - name: Zip artifact for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath NSC-ModManager.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NSC-ModManager.zip
